site_name: Paper Analysis Pipeline
site_description: Text extraction and analysis of AI/ML research papers using Grobid
site_author: Your Name
repo_url: https://github.com/yourusername/paper-analysis
repo_name: yourusername/paper-analysis

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - toc.integrate

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Validation: validation.md
  - Limitations: limitations.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
